project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!KEEP LOCAL/"

website:
  title: "Church Closures Dashboard"
  search: false
  page-navigation: false
  back-to-top-navigation: true
  bread-crumbs: false
  favicon: Images/DSDE-Social-Media-Profile.png
  repo-url: https://github.com/SOCAH-Lab/Church-Closures-Dashboard
  issue-url: https://github.com/SOCAH-Lab/Church-Closures-Dashboard/issues
  repo-actions: [source, issue]
  navbar:
    right:
      - text: "Review"
        href: Pages/Review.qmd
      - text: "Preparation"
        href: Pages/Cleaning and Harmonization.qmd
      - text: "Metrics"
        href: Pages/Metric Calculation.qmd
      - text: Contact
        href: https://ysph.yale.edu/public-health-research-and-practice/research-centers-and-initiatives/public-health-data-science-and-data-equity/contact-us/
        target: _blank
  page-footer:
    background: dark 
    left: "This site was built on a ysph-dsde.github.io page. It was rendered using Quarto (v 1.6.39) and theme [Lux](https://bootswatch.com/lux/)." 
    center: "This report was prepared by [Shelby Golden, M.S.](https://www.linkedin.com/in/shelby-golden/), a Data Scientist at YSPH DSDE."
    right: 
      - icon: globe
        href: https://ysph.yale.edu/public-health-research-and-practice/research-centers-and-initiatives/public-health-data-science-and-data-equity/
      - icon: github
        href: https://github.com/ysph-dsde
      - icon: linkedin
        href: https://www.linkedin.com/showcase/public-health-data-science-and-data-equity-at-yale/
      - icon: envelope 
        href: mailto:admin.dsdeysph@yale.edu
      - text: "(203) 737-8644"

format:
  html:
    include-in-header: 
      - _includes/google_analytics.html
    header-includes:
      - <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
      - <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    toc: true
    toc-depth: 4
    theme: lux
    css: styles.css
    from: markdown+autolink_bare_uris

